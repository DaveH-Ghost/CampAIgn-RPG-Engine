[project]
name = "realm-fabric"
version = "0.1.0"
description = "Grid-based agent simulation framework for reliable structured LLM output (V0.1 shipped; V0.2 design complete)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic",
    "openai",
    "rich",
    "python-dotenv",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[project.scripts]
realm = "src.main:main"
